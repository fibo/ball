<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>&lrm;</title>
  <link rel=icon href="logo.svg" type="image/svg+xml">

  <style>
    html {
      height: 100%;
    }

    body {
      min-height: 100%;
      font-family: system-ui;
      font-size: 28px;
      display: flex;
      flex-direction: column;
      margin: 0;
      color: black;
    }

     *::selection {
       background: black;
       color: orange;
     }

    main {
      flex: 1;
      display: grid;
      place-items: center;
    }

    info- {
      padding: 1em;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5em;
    }

    code {
      font-family: ui-monospace, monospace;
      background: orange;
	    corner-shape: notch;
      border-radius: 10px;
      padding: 4px 20px;
    }

    .actions {
      display: flex;
      gap: 1em;
      justify-content: center;
      padding: 1em;

      button {
        all: unset;
      }
    }

    noscript {
      margin: auto;
      font-size: 100px;
      color: orange;
    }
  </style>
</head>

<body>
  <info-></info->

  <main>
    <ball-></ball->
  </main>

  <div class="actions">
    <volume-></volume->
  </div>

  <web-socket></web-socket>

  <script type=module src="client.js"></script>

  <noscript>Enable JS</noscript>
</body>
</html>
